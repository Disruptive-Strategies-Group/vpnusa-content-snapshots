name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]
    paths-ignore:
      - '.github/workflows/code-agent.yml'
      - '.github/workflows/ci.yml'
      - '.github/workflows/lifecycle-bootstrap.yml'
      - '.github/workflows/issue-deploy-lifecycle.yml'
      - '.github/workflows/sam-deploy.yml'
      - '.github/workflows/ec2-deploy.yml'
      - '.github/workflows/terraform-deploy.yml'
      - '.github/workflows/validate-pr-no-ci-skip.yml'
      - '.github/workflows/agent-pr-ci-summary.yml'
      - '.github/WORKFLOW_LIFECYCLE.md'
      - '.github/deploy-lifecycle.core.json'
      - '.github/deploy-lifecycle.overlay.json'
      - 'CLAUDE.md'
      - '.claude/**'
      - '.devcontainer/**'
      - '.amazonq/**'
      - 'docs/agent-rules.md'
      - '.pre-commit-config.yaml'
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        if: hashFiles('requirements.txt') != '' || hashFiles('pyproject.toml') != ''
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Upgrade pip
        if: hashFiles('requirements.txt') != '' || hashFiles('pyproject.toml') != ''
        run: python -m pip install -U pip

      - name: Install runtime dependencies
        if: hashFiles('requirements.txt') != ''
        run: pip install -r requirements.txt

      - name: Install dev/test dependencies
        if: hashFiles('requirements.txt') != '' || hashFiles('pyproject.toml') != ''
        run: |
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          elif [ -f requirements-test.txt ]; then
            pip install -r requirements-test.txt
          else
            pip install pytest
          fi

      - name: Run pytest
        if: hashFiles('requirements.txt') != '' || hashFiles('pyproject.toml') != ''
        run: python -m pytest

      - name: CI bootstrap check
        if: hashFiles('requirements.txt') == '' && hashFiles('pyproject.toml') == ''
        run: echo "CI check registered (non-Python repo)"
